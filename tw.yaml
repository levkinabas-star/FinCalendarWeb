# Timeweb Cloud Configuration
# https://timeweb.cloud/docs/about/configuration

owner: levkinabas-star
repo: FinCalendarWeb
branch: frontend
runtime:
  name: node
  version: "20"
buildCommand: npm ci && npm run build
startCommand: npx serve -s dist -l 3000
environment:
  - key: NODE_ENV
    value: production
  - key: VITE_API_URL
    value: "https://api.ваш-домен.ru"
