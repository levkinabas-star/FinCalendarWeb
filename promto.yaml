name: fincalendar
comment: Финансовый календарь — React SPA + Express payment backend

services:
  web:
    friendly_name: "FinCalendar — Веб-приложение"
    type: frontend
    framework: react
    root_dir: /
    build_command: npm install && npm run build
    publish_dir: dist

  api:
    friendly_name: "Payment API (YooKassa)"
    type: backend
    framework: express
    runtime: node
    deployment_strategy: native
    root_dir: server
    start_command: node index.js
    env_vars:
      - name: PORT
        secret: false
      - name: YOOKASSA_SHOP_ID
        secret: true
      - name: YOOKASSA_SECRET_KEY
        secret: true
      - name: APP_URL
        secret: false
